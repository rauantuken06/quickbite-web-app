<div class="accordion">
    @for (item of items; track $index; let i = $index) {
        <div class="accordion-item">
            <button class="accordion-trigger" type="button" (click)="toggleItem(i)">
                <span>{{ item.title }}</span>
                <span class="icon" [class.open]="isOpen(i)">⌄</span>
            </button>
            
            @if (isOpen(i)) {
                <div class="accordion-content">
                    <div class="accordion-body">
                        {{ item.content }}
                    </div>
                </div>
            }
        </div>
    }
</div>
