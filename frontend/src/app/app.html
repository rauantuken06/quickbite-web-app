<div class="min-h-screen bg-gray-50">
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <a routerLink="/" class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center">
              <span class="text-white text-lg">
                <lucide-angular [img]="UtensilsCrossed"></lucide-angular>
              </span>
            </div>
            <span class="text-xl font-bold text-gray-900">QuickBite</span>
          </a>

          <div class="hidden sm:flex flex-col items-start pl-3 border-l border-gray-200 leading-tight">
            <span class="text-xs text-gray-400 uppercase tracking-wide">Total Orders</span>
            <span class="text-sm font-bold text-orange-600">{{ totalOrders }}</span>
          </div>
        </div>

        <div class="hidden md:flex items-center space-x-1">
          <a
            routerLink="/menu"
            class="px-4 py-2 rounded-lg transition-colors"
            [ngClass]="isActive('/menu') || isActive('/') ? 'bg-orange-50 text-orange-600' : 'text-gray-700 hover:bg-gray-100'"
          >
            Menu
          </a>

          <a
            routerLink="/cart"
            class="px-4 py-2 rounded-lg transition-colors flex items-center space-x-2"
            [ngClass]="isActive('/cart') ? 'bg-orange-50 text-orange-600' : 'text-gray-700 hover:bg-gray-100'"
          >
            <lucide-angular [img]="ShoppingCart" class="cart-logo"></lucide-angular>
            <span>Cart</span>
            @if (totalItems > 0) {
              <span class="bg-orange-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
                {{ totalItems }}
              </span>
            }
          </a>

          <a
            routerLink="/orders"
            class="px-4 py-2 rounded-lg transition-colors flex items-center space-x-2"
            [ngClass]="isActive('/orders') ? 'bg-orange-50 text-orange-600' : 'text-gray-700 hover:bg-gray-100'"
          >
            <lucide-angular [img]="PackageOpen" class="package-logo"></lucide-angular>
            <span>Orders</span>
          </a>

          <a
            *ngIf = "isAdmin()"
            routerLink="/admin/dishes"
            class="px-4 py-2 rounded-lg transition-colors flex items-center space-x-2"
            [ngClass]="isActive('/admin/dishes') || isActive('/admin/categories') || isActive('/admin/orders') ? 'bg-orange-50 text-orange-600' : 'text-gray-700 hover:bg-gray-100'"
          >
            <lucide-angular [img]="UserRoundCog" class="userroundcog-logo"></lucide-angular>
            <span>Admin</span>
          </a>
          <a
            *ngIf = "isLoggedIn()"
            routerLink="/account"
            class="px-4 py-2 rounded-lg transition-colors flex items-center space-x-2"
            [ngClass]="isActive('/account') ? 'bg-orange-50 text-orange-600' : 'text-gray-700 hover:bg-gray-100'"
          >
            <lucide-angular [img]="UserRound" class="userroundlogo-logo"></lucide-angular>
            <span>Account</span>
          </a>
        </div>

        <div class="flex items-center space-x-2">
          <button
            *ngIf="isLoggedIn()"
            (click)="logout()"
            class="px-4 py-2 rounded-lg transition-colors flex items-center space-x-2 text-gray-700 hover:bg-gray-100"
          >
            <lucide-angular [img]="LogOut" class="logout-logo"></lucide-angular>
            <span class="hidden sm:inline">Logout</span>
          </button>

          <a
            *ngIf = "!isLoggedIn()"
            routerLink="/login"
            class="px-4 py-2 rounded-lg transition-colors flex items-center space-x-2"
            [ngClass]="isActive('/login') ? 'bg-orange-50 text-orange-600' : 'text-gray-700 hover:bg-gray-100'"
          >
            <lucide-angular [img]="KeyRound" class="keyround-info"></lucide-angular>
            <span class="hidden sm:inline">Login</span>
          </a>

          <a
           *ngIf = "!isLoggedIn()"
            routerLink="/register"
            class="px-4 py-2 rounded-lg transition-colors flex items-center space-x-2"
            [ngClass]="isActive('/register') ? 'bg-orange-600 text-white' : 'bg-orange-500 text-white hover:bg-orange-600'"
          >
            <lucide-angular [img]="SquarePlus" class="squareplus-logo"></lucide-angular>
            <span class="hidden sm:inline">Register</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>
</div>
